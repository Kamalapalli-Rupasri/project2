<!DOCTYPE html>
<html>
<head>
  <title>Birds</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #e1f5fe, #b3e5fc);
      text-align: center;
      margin: 0;
      animation: fadeIn 1s ease-in;
    }

    h2 {
      background-color: #0288d1;
      color: white;
      padding: 15px;
      margin: 0;
      letter-spacing: 2px;
      animation: slideDown 1s ease-in-out;
    }

    .animals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background-color: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 6px 10px rgba(0,0,0,0.2);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      animation: slideUp 1s ease forwards;
      opacity: 0;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%;
      height: 150px;
      border-radius: 8px;
      transition: transform 0.4s ease;
    }

    .card img:hover {
      transform: scale(1.1);
    }

    .card h3 {
      color: #0288d1;
      transition: color 0.3s ease;
    }

    .card:hover h3 {
      color: #01579b;
    }

    .back {
      margin: 30px;
    }

    .back a {
      text-decoration: none;
      background-color: #0288d1;
      color: white;
      padding: 10px 25px;
      border-radius: 25px;
      transition: all 0.3s ease;
    }

    .back a:hover {
      background-color: #01579b;
      transform: scale(1.1);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    table {
      width: 60%;
      margin: 40px auto;
      border-collapse: collapse;
      font-size: 18px;
      background-color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeIn 2s ease-in;
    }

    th {
      background-color: #1565c0;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      text-align: center;
      transition: background 0.3s ease;
    }

    td, th {
      border: 1px solid #ddd;
    }

    tr:hover {
      background-color: #e3f2fd;
      transform: scale(1.02);
      transition: 0.3s ease;
    }

    /* Animations */

    @keyframes slideUp {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes slideDown {
      from {
        transform: translateY(-40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @media (min-width: 993px) {

  .animals {
    grid-template-columns: repeat(3, 1fr); /* 3 columns */
  }

  h2 {
    font-size: 28px;
  }

  table {
    width: 60%;
  }
}

  </style>
</head>

<body>

<h2>Birds</h2>

<div class="animals">

  <div class="card">
    <img src="https://cdn.pixabay.com/photo/2017/06/30/19/01/parrot-2459285_1280.jpg">
    <h3>Parrot</h3>
  </div>

  <div class="card">
    <img src="https://tse1.mm.bing.net/th/id/OIP.XA77vDgin4YKze3Z6vd0jwHaE8?pid=Api&P=0&h=180">
    <h3>Peacock</h3>
  </div>

  <div class="card">
    <img src="https://tse3.mm.bing.net/th/id/OIP.t33IyBbDTw32FxccAL_AewHaEO?pid=Api&P=0&h=180">
    <h3>Eagle</h3>
  </div>

</div>

<div class="back">
  <a href="project.html">Back to Home</a>
</div>

<table>
  <tr>
    <th>NAMES</th>
    <th>LIFE-SPAN</th>
  </tr>
  <tr>
    <td>Peacock</td>
    <td>15-20</td>
  </tr>
  <tr>
    <td>Parrot</td>
    <td>20-80</td>
  </tr>
  <tr>
    <td>Eagle</td>
    <td>20-30</td>
  </tr>
</table>

</body>
</html>
