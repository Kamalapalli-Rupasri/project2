<!DOCTYPE html>
<html>
<head>
  <title>Zoo Registration</title>
  <style>
    body {
      font-family: Arial;
      background-image: url("https://media.istockphoto.com/id/1001649432/vector/animals-and-wildlife-green-background.jpg?s=170667a&w=0&k=20&c=L2TUDbu6fQjIUW0UBDG4AZw47klMougnAII8wkk32zc=");
      background-repeat: no-repeat;
      background-size: cover;
    }
    .form {
      width: 400px;
      margin: 50px auto;
      background-color: white;
      padding: 20px;
      border: 1px solid #ccc;
    }
    h2 {
      text-align: center;
      color: green;
    }
    input {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
    }
    .btn {
      background-color: green;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
    }
  </style>
</head>

<body>
<div class="form">
  <h2>Zoo Registration</h2>

  <form action="project.html" method="get">
    <input type="text" placeholder="Enter Name" required>
    <input type="email" placeholder="Enter Email" required>
    <input type="number" placeholder="Enter Age" required>
    <input type="text" placeholder="City" required>
    <input type="submit" value="Register" class="btn">
  </form>
</div>
</body>
</html>
